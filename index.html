<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>AudioPie</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="header">
  <div class="brand">
    <img src="logo.png" alt="AudioPie Logo" class="logo" />
    <p class="tagline">AUDIOPIE - CUT INTO THE VIBE</p>
  </div>
</header>

  <main class="container">
    <div class="toolbar">
      <input id="search" type="search" placeholder="Search songs…" autocomplete="off" />
    </div>

    <section id="grid" class="grid" aria-live="polite"></section>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> Dingaan Media. AudioPie. All Rights Reserved.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
