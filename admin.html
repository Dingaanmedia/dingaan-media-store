<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Dingaan Media Admin</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <header class="top">
    <a class="back" href="index.html">← Back to Store</a>
    <div>
      <h1>Admin</h1>
      <p>Add, edit, remove songs. Save to GitHub via Netlify Function (optional) or export JSON.</p>
    </div>
  </header>

  <main class="wrap">
    <section class="panel">
      <div class="row">
        <button id="add" class="btn primary">+ Add Song</button>
        <button id="export" class="btn">Export songs.json</button>
        <button id="preview" class="btn">Preview changes on Store</button>
        <button id="clearPreview" class="btn danger">Clear Preview Override</button>
      </div>

      <div class="row">
        <input id="commitMsg" class="input" placeholder="(Optional) Commit message e.g. Add new songs" />
        <button id="saveRemote" class="btn primary">Save to Repo (Netlify Function)</button>
      </div>

      <div id="status" class="status"></div>
    </section>

    <section class="panel">
      <h2>Song List</h2>
      <div id="list" class="list"></div>
    </section>
  </main>

  <template id="itemTpl">
    <div class="item">
      <div class="itemHead">
        <strong class="itemTitle"></strong>
        <div class="itemBtns">
          <button class="btn small edit">Edit</button>
          <button class="btn small danger remove">Remove</button>
        </div>
      </div>
      <div class="itemMeta"></div>
    </div>
  </template>

  <dialog id="dlg">
    <form method="dialog" id="form" class="dlgForm">
      <h3 id="dlgTitle">Song</h3>
      <label>Title
        <input name="title" class="input" required />
      </label>
      <label>Artist
        <input name="artist" class="input" placeholder="(Optional)" />
      </label>
      <label>Price (R15–R100)
        <input name="price" class="input" type="number" min="15" max="100" required />
      </label>
      <label>Cover image path (e.g. covers/song1.jpg)
        <input name="cover" class="input" placeholder="covers/..." />
      </label>
      <label>Preview mp3 path (e.g. previews/song1-preview.mp3)
        <input name="preview" class="input" placeholder="previews/..." />
      </label>
      <label>Buy link (Payhip checkout link)
        <input name="buyLink" class="input" placeholder="https://..." />
      </label>
      <label class="check">
        <input name="exclusive" type="checkbox" checked />
        Exclusive
      </label>

      <div class="dlgActions">
        <button class="btn" value="cancel">Cancel</button>
        <button class="btn primary" id="saveBtn" value="ok">Save</button>
      </div>
    </form>
  </dialog>

  <script src="admin.js"></script>
</body>
</html>
